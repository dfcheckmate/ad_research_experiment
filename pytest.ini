# Pytest Configuration for Ad Research Experiment

[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Add src to Python path for imports
pythonpath = src

# Minimum Python version
minversion = 6.0

# Async support
asyncio_mode = auto

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --local-badge-output-dir=badges/
    --local-badge-generate=status
    --local-badge-generate=cov

# Markers for test categorization
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for component interactions
    slow: Slow tests (e.g., requiring network or browser)
    db: Database tests requiring SQLite or PostgreSQL
    browser: Tests requiring Playwright browser automation

# Ignore paths
norecursedirs =
    .git
    .github
    venv
    __pycache__
    *.egg-info
    dist
    build
    data
    results
    captures
    literature
    docs

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if 0:
    if False:
    if TYPE_CHECKING:
