name: CI

on:
  push:
    branches: [main, wip/*]
    tags: ['*']
  pull_request:
    branches: [main]

env:
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
  PYTHONPATH: ${{ github.workspace }}/src
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  EXPERIMENT_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
  MCP_CONTROLLER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/controller
  MCP_RUNNER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/runner

jobs:
  pytest:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest -q --cov=src --cov-report=xml --cov-report=term-missing
        env:
          DB_URL: sqlite:///test.db
          PROXY_MODE: local
          CAPTURE_SCREENSHOTS: '0'
          CAPTURE_DOM_SNIPPETS: '0'
          ENABLE_GOOGLE_SEARCH_MEASUREMENT: '0'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
            .coverage

  mcp-validate:
    name: Validate MCP Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r controller/requirements.txt
          pip install -r runner/requirements.txt
          pip install ruamel.yaml

      - name: Validate Python files
        run: |
          python -m py_compile controller/app.py runner/worker.py

      - name: Validate JSON configs
        run: |
          python -c 'import json; json.load(open("mcp_task.json", "r", encoding="utf-8"))'
          python -c 'import json; json.load(open("mcp_task_upstream.json", "r", encoding="utf-8"))'

      - name: Validate YAML config
        run: |
          python -c 'from ruamel.yaml import YAML; YAML(typ="safe").load(open("mcp_config.yml", "r", encoding="utf-8"))'

  mcp-docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build experiment image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ad-research-experiment:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build controller image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: controller/Dockerfile
          push: false
          tags: mcp-controller:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build runner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: runner/Dockerfile
          push: false
          tags: mcp-runner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  experiment-image-test:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: [mcp-docker-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build experiment image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ad-research-experiment:ci
          cache-from: type=gha
          load: true

      - name: Verify image exists
        run: |
          docker images | grep ad-research-experiment

      - name: Run tests in container
        run: |
          docker run --rm ad-research-experiment:ci pytest -q

  mcp-docker-push:
    name: Push Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_type == 'tag' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ github.ref_name }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push experiment image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.EXPERIMENT_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.EXPERIMENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push controller image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: controller/Dockerfile
          push: true
          tags: |
            ${{ env.MCP_CONTROLLER_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.MCP_CONTROLLER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push runner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: runner/Dockerfile
          push: true
          tags: |
            ${{ env.MCP_RUNNER_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.MCP_RUNNER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sphinx:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r docs/requirements.txt

      - name: Build Sphinx documentation
        run: |
          sphinx-build -b html docs docs/_build/html -q

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sphinx-docs
          path: docs/_build/html/
