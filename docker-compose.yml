services:
  # ── MCP orchestration (existing) ────────────────────────────────────────────
  controller:
    build:
      context: .
      dockerfile: controller/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MCP_CONFIG_PATH=/app/mcp_config.yml
    volumes:
      - ./mcp_config.yml:/app/mcp_config.yml:ro

  runner:
    build:
      context: .
      dockerfile: runner/Dockerfile
    depends_on:
      - controller
    environment:
      - CONTROLLER_URL=http://controller:8000
      - MCP_CONFIG_PATH=/work/mcp_config.yml
      - REPO_ROOT=/work/repo
      - RUNNER_ID=runner-local
      # Pass-through proxy-related env vars from the host shell.
      # (Avoid embedding credentials in mcp_task*.json when possible.)
      - PROXY_MODE=${PROXY_MODE:-}
      - PROXY_POOR=${PROXY_POOR:-}
      - PROXY_RICH=${PROXY_RICH:-}
      - UPSTREAM_PROXY=${UPSTREAM_PROXY:-}
      - PROXY_RESIDENTIAL_1=${PROXY_RESIDENTIAL_1:-}
      - PROXY_RESIDENTIAL_2=${PROXY_RESIDENTIAL_2:-}
      - PROXY_RESIDENTIAL_3=${PROXY_RESIDENTIAL_3:-}
      - PROXY_IDENTITY_META_JSON=${PROXY_IDENTITY_META_JSON:-}
      - PROXY_NODE_1=${PROXY_NODE_1:-}
      - PROXY_NODE_2=${PROXY_NODE_2:-}
      - PROXY_NODE_3=${PROXY_NODE_3:-}
    volumes:
      - ./:/work/repo
      - ./mcp_config.yml:/work/mcp_config.yml:ro

  # ── Experiment runner (standalone trial execution) ──────────────────────────
  # Usage:
  #   docker compose run --rm experiment                     # 10-trial smoke test
  #   docker compose run --rm experiment --trials 200         # full 200-trial run
  #   docker compose run --rm experiment --trials 50 --concurrency 1 --max-browsers 3
  experiment:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_URL=postgresql://researcher:research@postgres:5432/ad_research
      - PROXY_MODE=${PROXY_MODE:-residential}
      - PROXY_RESIDENTIAL_1=${PROXY_RESIDENTIAL_1}
      - PROXY_RESIDENTIAL_2=${PROXY_RESIDENTIAL_2}
      - PROXY_RESIDENTIAL_3=${PROXY_RESIDENTIAL_3}
      - PROXY_NODE_1=${PROXY_NODE_1:-}
      - PROXY_NODE_2=${PROXY_NODE_2:-}
      - PROXY_NODE_3=${PROXY_NODE_3:-}
      - PROXY_IDENTITY_META_JSON=${PROXY_IDENTITY_META_JSON}
      - MPLBACKEND=Agg
    volumes:
      - ./out:/app/out          # DB + results persist across runs
      - ./.env:/app/.env:ro     # credentials (read-only)
    shm_size: "2gb"             # Chromium needs shared memory (default 64MB → crashes)
    deploy:
      resources:
        limits:
          memory: 8g            # prevent OOM on 16GB host
    entrypoint: ["python", "src/experiment.py"]
    command: ["--trials", "10", "--concurrency", "2", "--max-browsers", "6"]

  # ── PostgreSQL (default — avoids SQLite lock contention during concurrent trials)
  # Usage: DB_URL is set on the experiment service by default.
  # To use SQLite instead, override: docker compose run --rm -e DB_URL=sqlite:///out/ads.db experiment
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ad_research
      POSTGRES_USER: researcher
      POSTGRES_PASSWORD: ${PG_PASSWORD:-research}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researcher -d ad_research"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
